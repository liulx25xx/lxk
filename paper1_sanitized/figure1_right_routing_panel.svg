<svg xmlns="http://www.w3.org/2000/svg" width="440" height="760" viewBox="0 0 440 760">
  <defs>
    <style>
      .title { font: 700 22px Arial, Helvetica, sans-serif; }
      .subtitle { font: 700 16px Arial, Helvetica, sans-serif; }
      .body { font: 400 15px Arial, Helvetica, sans-serif; }
      .card-title { font: 700 16px Arial, Helvetica, sans-serif; }
      .score { font: 700 28px Arial, Helvetica, sans-serif; }
      .small { font: 400 14px Arial, Helvetica, sans-serif; }
      .callout { font: 700 14px Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <rect x="8" y="8" width="424" height="744" rx="8" fill="#fffdfc" stroke="#f0b493" stroke-width="1"/>
  <rect x="8" y="8" width="424" height="78" rx="8" fill="#fff2ea" stroke="#f0b493" stroke-width="1"/>
  <text x="220" y="40" text-anchor="middle" class="title" fill="#c2340a">4. Type-Aware Routing</text>
  <text x="220" y="68" text-anchor="middle" class="subtitle" fill="#c2340a">(Online Selection &#8594; Performance)</text>

  <text x="220" y="120" text-anchor="middle" class="subtitle" fill="#111111">Policy performance <tspan class="body">(mean score, 0-3)</tspan></text>
  <text x="220" y="148" text-anchor="middle" class="body" fill="#111111">on evaluation set</text>

  <!-- Oracle card -->
  <rect x="24" y="180" width="392" height="86" rx="6" fill="#fbfaff" stroke="#c9bcef" stroke-width="1"/>
  <g transform="translate(62,223)" stroke="#202020" stroke-width="3" fill="none" opacity="0.9">
    <circle cx="0" cy="0" r="22"/>
    <circle cx="0" cy="0" r="12"/>
    <circle cx="0" cy="0" r="3" fill="#202020"/>
    <path d="M2 -2 L27 -27"/>
    <path d="M20 -29 L31 -31 L29 -20"/>
  </g>
  <text x="120" y="216" class="card-title" fill="#111111">Oracle type-specific</text>
  <text x="120" y="241" class="small" fill="#111111">(upper bound)</text>
  <text x="370" y="233" text-anchor="end" class="score" fill="#351090">2.32</text>

  <!-- Predicted card -->
  <rect x="24" y="292" width="392" height="86" rx="6" fill="#fbfaff" stroke="#c9bcef" stroke-width="1"/>
  <g transform="translate(62,335)" stroke="#202020" stroke-width="2.4" fill="none" opacity="0.78">
    <rect x="-18" y="-15" width="26" height="30" rx="3"/>
    <path d="M8 -8 L18 -8 M8 0 L20 0 M8 8 L18 8"/>
    <circle cx="22" cy="-8" r="2.5" fill="#202020"/>
    <circle cx="24" cy="0" r="2.5" fill="#202020"/>
    <circle cx="22" cy="8" r="2.5" fill="#202020"/>
    <path d="M-18 -8 L-27 -8 M-18 0 L-29 0 M-18 8 L-27 8"/>
    <circle cx="-30" cy="-8" r="2.5" fill="#202020"/>
    <circle cx="-32" cy="0" r="2.5" fill="#202020"/>
    <circle cx="-30" cy="8" r="2.5" fill="#202020"/>
  </g>
  <text x="120" y="328" class="card-title" fill="#111111">Predicted type</text>
  <text x="120" y="353" class="small" fill="#111111">(online classifier)</text>
  <text x="370" y="345" text-anchor="end" class="score" fill="#351090">2.17</text>

  <!-- Universal card -->
  <rect x="24" y="404" width="392" height="86" rx="6" fill="#fff9ed" stroke="#f4c979" stroke-width="1"/>
  <g transform="translate(62,447)" stroke="#202020" stroke-width="4" fill="none" opacity="0.9">
    <path d="M-24 0 H24"/>
    <path d="M8 -16 L24 0 L8 16"/>
  </g>
  <text x="120" y="440" class="card-title" fill="#111111">Universal reread_file</text>
  <text x="120" y="465" class="small" fill="#111111">(fixed strategy)</text>
  <text x="370" y="457" text-anchor="end" class="score" fill="#d97800">2.04</text>

  <!-- Generic retry card -->
  <rect x="24" y="516" width="392" height="86" rx="6" fill="#fff3f3" stroke="#f1b1b1" stroke-width="1"/>
  <g transform="translate(62,559)" stroke="#202020" stroke-width="3" fill="none" opacity="0.9">
    <path d="M-22 -4 A22 22 0 0 1 14 -18"/>
    <path d="M12 -31 L16 -17 L2 -20"/>
    <path d="M22 4 A22 22 0 0 1 -14 18"/>
    <path d="M-12 31 L-16 17 L-2 20"/>
  </g>
  <text x="120" y="552" class="card-title" fill="#111111">Generic retry</text>
  <text x="120" y="577" class="small" fill="#111111">(control)</text>
  <text x="370" y="569" text-anchor="end" class="score" fill="#d83b68">1.76</text>

  <!-- Online classifier callout -->
  <rect x="24" y="638" width="392" height="90" rx="6" fill="#fff8fb" stroke="#e85a83" stroke-width="1" stroke-dasharray="5 3"/>
  <g transform="translate(64,682)" stroke="#e23b70" stroke-width="2.6" fill="none">
    <path d="M-8 -24 C-25 -22 -25 -2 -14 0 C-28 4 -24 25 -5 22"/>
    <path d="M8 -24 C25 -22 25 -2 14 0 C28 4 24 25 5 22"/>
    <path d="M-8 -24 C0 -18 0 -9 -5 -4"/>
    <path d="M8 -24 C0 -18 0 -9 5 -4"/>
    <path d="M-5 22 C0 14 0 7 -5 0"/>
    <path d="M5 22 C0 14 0 7 5 0"/>
    <path d="M-16 -8 H-25 M16 -8 H25 M-17 10 H-25 M17 10 H25"/>
  </g>
  <text x="120" y="674" class="callout" fill="#d83b68">Online classifier: 74.8% accuracy</text>
  <text x="120" y="700" class="callout" fill="#d83b68">Predicted-type routing captures</text>
  <text x="120" y="724" class="callout" fill="#d83b68">73% of oracle gain</text>
</svg>
